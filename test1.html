<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>3D Moving Path Solver</title>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial;
      }
      #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
      }
      button {
        padding: 8px 12px;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
          "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
        }
      }
    </script>
  </head>
  <body>
    <div id="ui">
      <button id="solve">Find Largest Box</button>
    </div>

    <script type="module">
      import * as THREE from 'three'
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
      import GUI from 'lil-gui'

      /////////////////////////////////////////////////////////
      // Scene
      /////////////////////////////////////////////////////////

      const scene = new THREE.Scene()
      scene.background = new THREE.Color(0xf0f0f0)

      const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000)
      camera.position.set(200, 150, 200)

      const renderer = new THREE.WebGLRenderer({ antialias: true })
      renderer.setSize(innerWidth, innerHeight)
      document.body.appendChild(renderer.domElement)

      const controls = new OrbitControls(camera, renderer.domElement)

      scene.add(new THREE.GridHelper(500, 20))

      const light = new THREE.DirectionalLight(0xffffff, 1)
      light.position.set(200, 200, 200)
      scene.add(light)

      /////////////////////////////////////////////////////////
      // PATH MODEL
      /////////////////////////////////////////////////////////

      const path = [
        { type: 'opening', width: 42, height: 84, depth: 6 },

        { type: 'corridor', width: 60, height: 96, depth: 40 },

        { type: 'turn', angle: 90, width: 60, height: 96 },

        { type: 'opening', width: 42, height: 84, depth: 6 },

        { type: 'box', width: 65, height: 96, depth: 98 },
      ]

      /////////////////////////////////////////////////////////
      // BOX OBJECT
      /////////////////////////////////////////////////////////

      let boxMesh = null

      function createBox(w, h, d) {
        if (boxMesh) scene.remove(boxMesh)

        const geo = new THREE.BoxGeometry(w, h, d)
        const mat = new THREE.MeshStandardMaterial({
          color: 0x44aa88,
          transparent: true,
          opacity: 0.7,
        })

        boxMesh = new THREE.Mesh(geo, mat)
        boxMesh.position.set(0, h / 2, 0)

        scene.add(boxMesh)
      }

      /////////////////////////////////////////////////////////
      // GEOMETRY CHECK
      /////////////////////////////////////////////////////////

      function fitsOpening(box, opening) {
        return box.w <= opening.width && box.h <= opening.height
      }

      function fitsTurn(box, turn) {
        // simple pivot bounding box approximation

        const diagonal = Math.sqrt(box.w * box.w + box.d * box.d)

        return diagonal <= turn.width && box.h <= turn.height
      }

      function fitsElevator(box, elev) {
        return box.w <= elev.width && box.h <= elev.height && box.d <= elev.depth
      }

      /////////////////////////////////////////////////////////
      // PATH VALIDATION
      /////////////////////////////////////////////////////////

      function canTravel(box) {
        for (const seg of path) {
          if (seg.type === 'opening') {
            if (!fitsOpening(box, seg)) return false
          }

          if (seg.type === 'turn') {
            if (!fitsTurn(box, seg)) return false
          }

          if (seg.type === 'box') {
            if (!fitsElevator(box, seg)) return false
          }
        }

        return true
      }

      /////////////////////////////////////////////////////////
      // MONTE CARLO SOLVER
      /////////////////////////////////////////////////////////

      function findLargest() {
        let best = { w: 10, h: 10, d: 10 }
        let bestVolume = 0

        for (let i = 0; i < 50000; i++) {
          const candidate = {
            w: 20 + Math.random() * 70,
            h: 20 + Math.random() * 90,
            d: 20 + Math.random() * 90,
          }

          if (canTravel(candidate)) {
            const vol = candidate.w * candidate.h * candidate.d

            if (vol > bestVolume) {
              best = candidate
              bestVolume = vol
            }
          }
        }

        console.log('BEST BOX', best)
        createBox(best.w, best.h, best.d)
      }

      /////////////////////////////////////////////////////////
      // DRAW PATH SPACES
      /////////////////////////////////////////////////////////

      function drawSpaces() {
        let offset = 0

        for (const seg of path) {
          if (seg.width) {
            const geo = new THREE.BoxGeometry(seg.width, seg.height, seg.depth || 10)

            const mat = new THREE.MeshBasicMaterial({
              wireframe: true,
              color: 0x000000,
            })

            const mesh = new THREE.Mesh(geo, mat)

            mesh.position.z = offset
            mesh.position.y = seg.height / 2

            scene.add(mesh)

            offset += seg.depth || 20
          }
        }
      }

      drawSpaces()

      /////////////////////////////////////////////////////////
      // GUI
      /////////////////////////////////////////////////////////

      const params = {
        width: 40,
        height: 70,
        depth: 40,
      }

      const gui = new GUI()

      const c1 = gui.add(params, 'width', 10, 80)
      const c2 = gui.add(params, 'height', 10, 96)
      const c3 = gui.add(params, 'depth', 10, 100)

      function updateBox() {
        createBox(params.width, params.height, params.depth)

        console.log(
          'fits path:',
          canTravel({
            w: params.width,
            h: params.height,
            d: params.depth,
          })
        )
      }

      c1.onChange(updateBox)
      c2.onChange(updateBox)
      c3.onChange(updateBox)

      updateBox()

      /////////////////////////////////////////////////////////
      // SOLVE BUTTON
      /////////////////////////////////////////////////////////

      document.getElementById('solve').onclick = findLargest

      /////////////////////////////////////////////////////////
      // LOOP
      /////////////////////////////////////////////////////////

      function animate() {
        requestAnimationFrame(animate)
        controls.update()
        renderer.render(scene, camera)
      }

      animate()
    </script>
  </body>
</html>
